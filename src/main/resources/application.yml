server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/trip_adaptive?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      write-dates-as-timestamps: false
  web:
    resources:
      add-mappings: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
app:
  seed:
    enabled: true
  qweather:
      key: ${QWEATHER_KEY:}
      host: ${QWEATHER_HOST:https://openapi.weathercn.com}

weather:
  cache-ttl-minutes: ${WEATHER_CACHE_TTL:60}   # alerts/forecast 缓存 30 分钟
  poll-enabled: ${WEATHER_POLL:false}          # 定时轮询开关,默认关,避免烧配额
  poll-interval-ms: 3600000                    # 60 分钟
  forecast-window-days: 3                       # 只查近 3 天内的节点
