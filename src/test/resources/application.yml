server:
  port: 0
spring:
  datasource:
    url: jdbc:h2:mem:trip_adaptive;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: false
      path: /h2-console
  jackson:
    serialization:
      write-dates-as-timestamps: false
  web:
    resources:
      add-mappings: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
app:
  seed:
    enabled: false
  qweather:
    key:
    host: https://openapi.weathercn.com
  jwt:
    secret: test-only-jwt-secret-with-at-least-32-bytes
    expiration: 86400000
weather:
  cache-ttl-minutes: 60
  poll-enabled: false
  poll-interval-ms: 3600000
  forecast-window-days: 3
  replan-risk-threshold: HIGH
  replan-buffer-minutes: 30
